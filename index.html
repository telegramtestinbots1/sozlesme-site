<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Param Güvende Sözleşme</title>

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background:#f4f6f8;
}

/* HEADER */
.header {
    background:#0f172a;
    padding:18px 12px;
}

.header-center {
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:6px;
}

.logo { height:28px; }

.sub {
    color:#cbd5e1;
    font-size:12px;
}

.secure-badge {
    margin-top:6px;
    background:linear-gradient(135deg, #16a34a, #22c55e);
    color:white;
    font-size:11px;
    padding:4px 10px;
    border-radius:999px;
    font-weight:600;
}

/* CONTAINER */
.container {
    padding:16px;
    max-width:720px;
    margin:auto;
}

/* CARD */
.card {
    background:white;
    border-radius:12px;
    padding:14px;
    margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.title {
    font-weight:700;
    text-align:center;
}

/* BUTTON */
.actions {
    position:sticky;
    bottom:0;
    background:white;
    padding:12px;
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:700;
}

.primary {
    background:#16a34a;
    color:white;
}

/* SIGN */
canvas {
    width:100%;
    height:180px;
    border:2px dashed #cbd5e1;
    border-radius:10px;
}

/* MODAL */
.modal {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-box {
    background:white;
    padding:20px;
    border-radius:12px;
    max-width:300px;
    text-align:center;
    font-size:14px;
}

.modal-box button {
    margin-top:10px;
    background:#16a34a;
    color:white;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="title">İmzanız</div>
<canvas id="pad"></canvas>
</div>

<div class="card">
<label>
<input type="checkbox" id="check">
 Sözleşmeyi okudum ve kabul ediyorum
</label>
</div>

</div>

<div class="actions">
<button class="primary" onclick="send()">Sözleşmeyi Onayla ve İmzala</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-box">
        <div id="modalText"></div>
        <button onclick="closeModal()">Tamam</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>
const canvas = document.getElementById("pad");
const pad = new SignaturePad(canvas);

function resize(){
 let ratio = Math.max(window.devicePixelRatio,1);
 canvas.width = canvas.offsetWidth * ratio;
 canvas.height = canvas.offsetHeight * ratio;
 canvas.getContext("2d").scale(ratio,ratio);
}
resize();

/* MODAL */
function showModal(text){
 document.getElementById("modalText").innerText = text;
 document.getElementById("modal").style.display = "flex";
}

function closeModal(){
 document.getElementById("modal").style.display = "none";
}

/* GÖNDER */
function send(){

 // 1️⃣ checkbox yoksa
 if(!document.getElementById("check").checked){
   showModal("Sözleşmeyi kabul etmelisiniz");
   return;
 }

 // 2️⃣ imza yoksa
 if(pad.isEmpty()){
   showModal("İmza gereklidir");
   return;
 }

 // 3️⃣ başarı
 showModal("Sözleşmeniz başarıyla kayıt altına alınmıştır. Yetkili temsilcinizi bilgilendirmenizi rica ederiz.");
}
</script>

</body>
</html>
